<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omikuji — Michael C. Wang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&display=swap&text=ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789%20.%2C%3B%3A%27-%E2%80%94%26%21%22%3F%28%29/%E5%BE%A1%E7%A5%9E%E7%B1%A4%E5%A4%A7%E4%B8%AD%E5%B0%8F%E5%90%89%E5%8D%8A%E6%9C%AB%E5%87%B6%E6%83%A8%E4%BA%8B"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Yuji+Mai&display=swap&text=%E5%BE%A1%E7%A5%9E%E7%B1%A4"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --hero-bg: #dde3eb;
      --body-bg: #ffffff;
      --text: #1c1c1a;
      --muted: #6a7280;
      --accent: #2c4a6e;
      --rule: #cdd4dc;
      --slip-ink: #14110f;
      --slip-red: #8b1a1a;
      --nav-height: 50px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Figtree', sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: var(--text);
      background: var(--body-bg);
      min-height: 100vh;
    }

    /* ── NAV (matches main site) ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-height);
      background: rgba(255,255,255,0.95);
      border-bottom: 1px solid var(--rule);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 56px;
      z-index: 100;
    }

    .nav-name {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--muted);
      text-decoration: none;
    }
    .nav-name:hover { color: var(--text); }

    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.03em;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    /* ── PAGE LAYOUT ── */
    main {
      padding-top: var(--nav-height);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page-inner {
      max-width: 820px;
      width: 100%;
      padding: 60px 56px 96px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── OMIKUJI BOX (clickable) ── */
    .box-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-bottom: 60px;
    }

    .omikuji-box {
      position: relative;
      width: 110px;
      height: 210px;
      cursor: pointer;
      transform-origin: center center;
      background: transparent;
      border: 0;
      padding: 0;
      outline: none;
    }
    .omikuji-box:disabled { cursor: default; }
    .omikuji-box:focus-visible { outline: 2px solid var(--accent); outline-offset: 6px; border-radius: 4px; }

    .omikuji-box svg {
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 8px 14px rgba(20, 17, 15, 0.25));
    }

    /* shake animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0) rotate(0); }
      10%      { transform: translateX(-3px) rotate(-2deg); }
      20%      { transform: translateX(3px)  rotate(2deg); }
      30%      { transform: translateX(-4px) rotate(-3deg); }
      40%      { transform: translateX(4px)  rotate(3deg); }
      50%      { transform: translateX(-3px) rotate(-2deg); }
      60%      { transform: translateX(3px)  rotate(2deg); }
      70%      { transform: translateX(-2px) rotate(-1deg); }
      80%      { transform: translateX(2px)  rotate(1deg); }
      90%      { transform: translateX(-1px) rotate(0); }
    }
    .omikuji-box.shaking { animation: shake 0.9s ease-in-out; }

    /* ── SLIP (the omikuji result) ── */
    .slip-stage {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 80px;
    }

    .slip {
      position: relative;
      width: 320px;
      max-width: 100%;
      background: #fdfbf5;
      padding: 22px;          /* gap between outer paper and inner border */
      box-shadow:
        0 1px 0 rgba(0,0,0,0.05),
        0 24px 48px -24px rgba(20,17,15,0.25),
        0 8px 16px -8px rgba(20,17,15,0.18);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }
    .slip.visible { opacity: 1; transform: translateY(0); }

    .slip::before {
      /* subtle paper texture */
      content: "";
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(180,150,100,0.05), transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(180,150,100,0.04), transparent 60%);
      pointer-events: none;
    }

    .slip-inner {
      position: relative;
      border: 1.5px solid var(--slip-ink);
      padding: 28px 22px;
      display: flex;
      flex-direction: column;
    }

    /* header — kanji horizontal, english small underneath */
    .slip-header {
      text-align: center;
      padding-bottom: 18px;
      border-bottom: 0.5px solid rgba(20,17,15,0.25);
      margin-bottom: 18px;
    }
    .slip-kanji {
      font-family: 'Shippori Mincho', serif;
      font-size: 34px;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--slip-ink);
      line-height: 1;
      margin-bottom: 8px;
    }
    /* Catastrophe is longer (3 chars) — slightly tighter */
    .slip-kanji.long { letter-spacing: 0.1em; font-size: 30px; }

    .slip-en {
      font-family: 'Shippori Mincho', serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--slip-ink);
      text-transform: uppercase;
    }

    /* category list */
    .slip-cats {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 20px;
    }
    .slip-cat {
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .slip-cat.visible { opacity: 1; transform: translateY(0); }

    .slip-cat-label {
      font-family: 'Shippori Mincho', serif;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--slip-ink);
      margin-bottom: 3px;
    }
    .slip-cat-text {
      font-family: 'Shippori Mincho', serif;
      font-size: 13.5px;
      font-weight: 400;
      line-height: 1.55;
      color: var(--slip-ink);
    }

    /* footer block: omen + activity */
    .slip-footer {
      margin-top: 20px;
      padding-top: 18px;
      border-top: 0.5px solid rgba(20,17,15,0.25);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .slip-foot-item {
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .slip-foot-item.visible { opacity: 1; transform: translateY(0); }

    .slip-foot-label {
      font-family: 'Shippori Mincho', serif;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--slip-ink);
      margin-bottom: 2px;
    }
    .slip-foot-text {
      font-family: 'Shippori Mincho', serif;
      font-size: 13px;
      font-style: italic;
      font-weight: 400;
      line-height: 1.5;
      color: var(--slip-ink);
    }

    /* mobile */
    @media (max-width: 640px) {
      nav { padding: 0 24px; }
      .page-inner { padding: 64px 24px 64px; }
      .slip { width: 100%; padding: 18px; }
      .slip-inner { padding: 24px 18px; }
      .slip-kanji { font-size: 30px; }
    }

    @media (min-width: 900px) {
      body { font-size: 17px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-name">Michael C. Wang</a>
    <ul class="nav-links">
      <li><a href="/#research">Research</a></li>
      <li><a href="/cv.pdf">CV</a></li>
    </ul>
  </nav>

  <main>
    <div class="page-inner">
      <div class="box-stage">
        <button id="omikujiBox" class="omikuji-box" aria-label="Shake the omikuji box">
          <svg viewBox="0 0 110 210" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <!-- main body wood gradient — deeper, warmer -->
              <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"  stop-color="#a37a4d"/>
                <stop offset="35%" stop-color="#8b6238"/>
                <stop offset="70%" stop-color="#724e2a"/>
                <stop offset="100%" stop-color="#5e3f22"/>
              </linearGradient>
              <!-- lid/base band — slightly darker, distinct from body -->
              <linearGradient id="band" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"  stop-color="#6e4824"/>
                <stop offset="50%" stop-color="#5a3a1c"/>
                <stop offset="100%" stop-color="#4a2f17"/>
              </linearGradient>
              <!-- side shading: rounds out the volume -->
              <linearGradient id="sideShade" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%"   stop-color="#000" stop-opacity="0.28"/>
                <stop offset="15%"  stop-color="#000" stop-opacity="0.05"/>
                <stop offset="50%"  stop-color="#fff" stop-opacity="0.04"/>
                <stop offset="85%"  stop-color="#000" stop-opacity="0.05"/>
                <stop offset="100%" stop-color="#000" stop-opacity="0.32"/>
              </linearGradient>
            </defs>

            <!-- box body -->
            <rect x="3" y="3" width="104" height="204" rx="2.5" ry="2.5"
                  fill="url(#wood)" stroke="#2e1c0c" stroke-width="1.3"/>

            <!-- side shading for volume -->
            <rect x="3" y="3" width="104" height="204" rx="2.5" ry="2.5"
                  fill="url(#sideShade)" pointer-events="none"/>

            <!-- top lid band (narrower) -->
            <rect x="3" y="3" width="104" height="14" rx="2.5" ry="2.5"
                  fill="url(#band)" stroke="#2e1c0c" stroke-width="1.3"/>
            <line x1="5" y1="5" x2="105" y2="5" stroke="#fff" stroke-opacity="0.18" stroke-width="0.8"/>
            <line x1="3" y1="17" x2="107" y2="17" stroke="#1d1106" stroke-width="0.6" stroke-opacity="0.85"/>
            <line x1="3" y1="17.7" x2="107" y2="17.7" stroke="#fff" stroke-opacity="0.06" stroke-width="0.4"/>

            <!-- bottom base band (narrower) -->
            <rect x="3" y="193" width="104" height="14" rx="2.5" ry="2.5"
                  fill="url(#band)" stroke="#2e1c0c" stroke-width="1.3"/>
            <line x1="3" y1="193" x2="107" y2="193" stroke="#1d1106" stroke-width="0.6" stroke-opacity="0.85"/>
            <line x1="3" y1="193.7" x2="107" y2="193.7" stroke="#fff" stroke-opacity="0.06" stroke-width="0.4"/>

            <!-- 御神籤 vertically — centered between lid and base -->
            <text x="55" y="68" text-anchor="middle"
                  font-family="'Yuji Mai', 'Shippori Mincho', serif"
                  font-size="34" fill="#f8efd6" opacity="0.95">御</text>
            <text x="55" y="112" text-anchor="middle"
                  font-family="'Yuji Mai', 'Shippori Mincho', serif"
                  font-size="34" fill="#f8efd6" opacity="0.95">神</text>
            <text x="55" y="156" text-anchor="middle"
                  font-family="'Yuji Mai', 'Shippori Mincho', serif"
                  font-size="34" fill="#f8efd6" opacity="0.95">籤</text>
          </svg>
        </button>
      </div>

      <div class="slip-stage">
        <div id="slip" class="slip" hidden>
          <div class="slip-inner">
            <div class="slip-header">
              <div id="slipKanji" class="slip-kanji"></div>
              <div id="slipEn" class="slip-en"></div>
            </div>

            <div id="slipCats" class="slip-cats"></div>

            <div id="slipFooter" class="slip-footer">
              <div class="slip-foot-item" data-key="omen">
                <div class="slip-foot-label">Omen</div>
                <div class="slip-foot-text" id="slipOmen"></div>
              </div>
              <div class="slip-foot-item" data-key="activity">
                <div class="slip-foot-label">Suggested Activity</div>
                <div class="slip-foot-text" id="slipActivity"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

<script>
  // ──────────────────────────────────────────────────────────
  //  DATA
  // ──────────────────────────────────────────────────────────

  // Original probabilities preserved.
  // `weights` = how this result row distributes across rating columns
  //   in the docx table (++, +, 0, -). When the row has weight in the
  //   "-" column, that weight is split between "-" and "--" with the
  //   "-" being twice as likely as "--".
  const omikujiList = [
    { name: "Great Blessing",  kanji: "大吉",   en: "Great Blessing",   prob: 0.10, overall: "++", weights: { "++": 2, "+": 2, "0": 0, "-": 0 } },
    { name: "Middle Blessing", kanji: "中吉",   en: "Middle Blessing",  prob: 0.15, overall: "++", weights: { "++": 1, "+": 2, "0": 1, "-": 0 } },
    { name: "Small Blessing",  kanji: "小吉",   en: "Small Blessing",   prob: 0.20, overall: "+",  weights: { "++": 1, "+": 1, "0": 2, "-": 0 } },
    { name: "Blessing",        kanji: "吉",     en: "Blessing",         prob: 0.24, overall: "+",  weights: { "++": 0, "+": 2, "0": 2, "-": 0 } },
    { name: "Half-blessing",   kanji: "半吉",   en: "Half-blessing",    prob: 0.05, overall: "0",  weights: { "++": 0, "+": 1, "0": 3, "-": 0 } },
    { name: "Future Blessing", kanji: "末吉",   en: "Future Blessing",  prob: 0.10, overall: "0",  weights: { "++": 0, "+": 1, "0": 2, "-": 1 } },
    { name: "Curse",           kanji: "凶",     en: "Curse",            prob: 0.10, overall: "-",  weights: { "++": 0, "+": 0, "0": 2, "-": 2 } },
    { name: "Great Curse",     kanji: "大凶",   en: "Great Curse",      prob: 0.05, overall: "-",  weights: { "++": 0, "+": 0, "0": 1, "-": 3 } },
    { name: "Catastrophe",     kanji: "大惨事", en: "Catastrophe",      prob: 0.01, overall: "--", weights: { "++": 0, "+": 0, "0": 0, "-": 4 } }
  ];

  // Category lines from omikuji_v2.docx.
  // Keyed by rating: ++, +, 0, -, --
  const categories = {
    "Overall": {
      "++": [
        "An excellent day for new beginnings.",
        "Fortune walks beside you.",
        "The road is clear and the weather is good.",
        "A day to enjoy the fruits of labor."
      ],
      "+": [
        "Good things are closer than they appear.",
        "Small joys await you.",
        "Smooth sailing ahead."
      ],
      "0": [
        "A calm and steady day.",
        "Better things are coming.",
        "The door is unlocked; you just have to push.",
        "Good things come to those who wait."
      ],
      "-": [
        "A challenging day awaits.",
        "Be cautious of obstacles.",
        "Wait for the tide before setting sail."
      ],
      "--": [
        "Disaster lurks in the shadows."
      ]
    },
    "Relationships": {
      "++": [
        "The person you are thinking of is thinking of you too.",
        "Deep bonds blossom into love.",
        "Destiny brings fated lovers together."
      ],
      "+": [
        "Someone remembers you more fondly than you know.",
        "Warm connections grow.",
        "The right words will come when you need them."
      ],
      "0": [
        "The timing is neither wrong nor right.",
        "Some connections need time to grow.",
        "Not every silence is an absence."
      ],
      "-": [
        "The one you are thinking of is carrying pain you cannot see.",
        "Destiny is out of our hands.",
        "A connection is asking more of you than you can give."
      ],
      "--": [
        "What you hoped for is not coming.",
        "Destiny pulls someone away, and reaching harder only causes pain."
      ]
    },
    "Work & Studies": {
      "++": [
        "Something you submitted is coming back in your favor.",
        "An obstacle is about to move.",
        "Your work is being noticed by the right people."
      ],
      "+": [
        "What you have been building is closer than it feels.",
        "Someone in a position to help is paying attention.",
        "Effort is accumulating even when progress is invisible."
      ],
      "0": [
        "Work asks for steadiness, not brilliance.",
        "What is unfinished will wait.",
        "Not every slow day is wasted."
      ],
      "-": [
        "What you are pushing against is not yet ready to give.",
        "The next step is not as clear as you thought.",
        "Effort alone will not be enough today."
      ],
      "--": [
        "The work is not lost but may need to be set aside.",
        "What you built is shakier than it appeared."
      ]
    },
    "Health": {
      "++": [
        "A day to surpass old limits.",
        "Your efforts will come to fruition.",
        "Energy you had written off will return."
      ],
      "+": [
        "The body is responding to your efforts.",
        "Real progress is closer than it appears.",
        "You are stronger than your most tired day."
      ],
      "0": [
        "Listen to your body when it asks for something.",
        "Invisible effort is not wasted effort.",
        "Rest taken now is work done later."
      ],
      "-": [
        "What you are ignoring will get louder.",
        "Pushing forward is not always moving forward.",
        "Limits exist for a reason."
      ],
      "--": [
        "Small mistakes can lead to great setbacks.",
        "Misfortune can strike seemingly at random."
      ]
    },
    "Chance": {
      "++": [
        "A lost treasure shall return.",
        "An encounter today will bring more than you expect.",
        "Unexpected arrivals are not always bad.",
        "A windfall will answer your prayers."
      ],
      "+": [
        "A good day for finding lost valuables.",
        "The person you meet is not entirely an accident.",
        "An interruption today will yet be useful.",
        "An unexpected gain awaits."
      ],
      "0": [
        "We learn more from searching than from finding.",
        "The unexpected is coming.",
        "Something is in motion that you did not start."
      ],
      "-": [
        "Some lost things are meant to be gone.",
        "Someone you did not plan for needs your attention.",
        "What comes today is unappreciated but must be accepted.",
        "Be prepared for unanticipated expenses."
      ],
      "--": [
        "All material items may someday be lost.",
        "What finds you today was looking for you.",
        "The interruption is not small; clear your afternoon."
      ]
    }
  };

  // Omens — three variants per omen. Index by rating tier (positive / neutral / negative).
  // For ratings: ++ and + → positive; 0 → neutral; - and -- → negative.
  // The omen rating is drawn independently at random from the same pool.
  const omens = [
    { positive: "An open window.",                    neutral: "A half-open window.",                negative: "A stuck window." },
    { positive: "A clock.",                           neutral: "An alarm.",                          negative: "A clock running slow." },
    { positive: "A dry umbrella.",                    neutral: "An umbrella.",                       negative: "A wet umbrella." },
    { positive: "A friendly cat.",                    neutral: "A passive cat.",                     negative: "An angry cat." },
    { positive: "A hot cup.",                         neutral: "A warm cup.",                        negative: "A cold cup." },
    { positive: "An open door.",                      neutral: "A cracked door.",                    negative: "A stuck door." },
    { positive: "A shortcut.",                        neutral: "An unfamiliar street.",              negative: "A street longer than it looks." },
    { positive: "A light left on for you.",           neutral: "A light left on.",                   negative: "A light left on all night." },
    { positive: "Dogs playing together.",             neutral: "Dogs greeting each other.",          negative: "Dogs fighting each other." }
  ];

  const suggestedActivities = [
    "Search for Shiba Inu.",
    "Eat Japanese food.",
    "Photograph symmetry.",
    "Take a different route home.",
    "Draw something badly.",
    "Greet the next pet you see.",
    "Try a new flavor.",
    "Leave 10 minutes early.",
    "Say goodbye in the wrong language.",
    "Sit in a different seat.",
    "Walk slower than usual.",
    "Eat slower than usual.",
    "Fold something.",
    "Suggest an activity."
  ];

  // ──────────────────────────────────────────────────────────
  //  DRAW LOGIC
  // ──────────────────────────────────────────────────────────

  function randomChoice(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  // Pick an omikuji result by weighted prob.
  function drawResult() {
    const r = Math.random();
    let cum = 0;
    for (const o of omikujiList) {
      cum += o.prob;
      if (r < cum) return o;
    }
    return omikujiList[omikujiList.length - 1];
  }

  // Given a result row's weights {++, +, 0, -}, expand the "-"
  // column into a 2:1 split between "-" and "--", then sample a
  // rating proportionally.
  function drawRating(weights) {
    const expanded = {
      "++": weights["++"]      || 0,
      "+":  weights["+"]       || 0,
      "0":  weights["0"]       || 0,
      "-":  (weights["-"] || 0) * (2/3),
      "--": (weights["-"] || 0) * (1/3)
    };
    const total = Object.values(expanded).reduce((a, b) => a + b, 0);
    if (total === 0) return "0"; // shouldn't happen
    let r = Math.random() * total;
    for (const [k, w] of Object.entries(expanded)) {
      r -= w;
      if (r < 0) return k;
    }
    return "0";
  }

  function ratingTier(rating) {
    if (rating === "++" || rating === "+") return "positive";
    if (rating === "0") return "neutral";
    return "negative";
  }

  // Build the full draw payload for one click.
  function buildDraw() {
    const result = drawResult();
    const cats = {};
    for (const catName of Object.keys(categories)) {
      // Overall is fixed per the docx table; the other categories sample.
      const rating = (catName === "Overall")
        ? result.overall
        : drawRating(result.weights);
      const lines = categories[catName][rating] || categories[catName]["0"];
      cats[catName] = randomChoice(lines);
    }

    // Omen drawn independently — random omen, random tier.
    const omen = randomChoice(omens);
    const omenTier = randomChoice(["positive", "neutral", "negative"]);
    const omenText = omen[omenTier];

    return {
      result,
      cats,
      omen: omenText,
      activity: randomChoice(suggestedActivities)
    };
  }

  // ──────────────────────────────────────────────────────────
  //  RENDER
  // ──────────────────────────────────────────────────────────

  const boxBtn   = document.getElementById("omikujiBox");
  const slipStage = document.querySelector(".slip-stage");
  const slip     = document.getElementById("slip");
  const slipKanji = document.getElementById("slipKanji");
  const slipEn   = document.getElementById("slipEn");
  const slipCats = document.getElementById("slipCats");
  const slipOmen = document.getElementById("slipOmen");
  const slipActivity = document.getElementById("slipActivity");

  let maxStageHeight = 0;

  function clearSlip() {
    slip.classList.remove("visible");
    slip.hidden = true;
    slipCats.innerHTML = "";
    slipKanji.textContent = "";
    slipEn.textContent = "";
    slipOmen.textContent = "";
    slipActivity.textContent = "";
    slip.querySelectorAll(".slip-foot-item").forEach(el => el.classList.remove("visible"));
  }

  function renderDraw(draw) {
    // header
    slipKanji.textContent = draw.result.kanji;
    slipKanji.classList.toggle("long", draw.result.kanji.length > 2);
    slipEn.textContent = draw.result.en;

    // categories
    slipCats.innerHTML = "";
    for (const [catName, line] of Object.entries(draw.cats)) {
      const wrap = document.createElement("div");
      wrap.className = "slip-cat";
      wrap.innerHTML = `
        <div class="slip-cat-label">${catName}</div>
        <div class="slip-cat-text">${line}</div>
      `;
      slipCats.appendChild(wrap);
    }

    // footer text
    slipOmen.textContent = draw.omen;
    slipActivity.textContent = draw.activity;

    // reveal slip
    slip.hidden = false;
    requestAnimationFrame(() => {
      slip.classList.add("visible");

      // After each render, lock the stage height to the tallest slip
      // we've seen. This prevents the page from collapsing when a slip
      // is cleared between draws, and also avoids growth when a later
      // draw happens to be taller than earlier ones.
      const h = slip.getBoundingClientRect().height;
      if (h > maxStageHeight) {
        maxStageHeight = h;
        slipStage.style.minHeight = `${h}px`;
      }

      // staggered reveal of categories
      const catEls = slip.querySelectorAll(".slip-cat");
      catEls.forEach((el, i) => {
        setTimeout(() => el.classList.add("visible"), 300 + i * 240);
      });
      // footer items reveal after categories
      const footEls = slip.querySelectorAll(".slip-foot-item");
      const footStart = 300 + catEls.length * 240 + 180;
      footEls.forEach((el, i) => {
        setTimeout(() => el.classList.add("visible"), footStart + i * 280);
      });
    });
  }

  function go() {
    if (boxBtn.disabled) return;
    boxBtn.disabled = true;
    clearSlip();

    // shake animation
    boxBtn.classList.remove("shaking");
    void boxBtn.offsetWidth; // force reflow to restart anim
    boxBtn.classList.add("shaking");

    // after shake, render draw
    setTimeout(() => {
      const draw = buildDraw();
      renderDraw(draw);
      boxBtn.disabled = false;
    }, 900);
  }

  boxBtn.addEventListener("click", go);
</script>
</body>
</html>
